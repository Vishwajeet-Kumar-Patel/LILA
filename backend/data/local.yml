name: nakama-server
logger:
  level: "DEBUG"
  stdout: true
# Database address is passed via --database.address CLI flag when starting Nakama
# PostgreSQL example:  postgres:postgres@127.0.0.1:5432/nakama
# CockroachDB example: root@127.0.0.1:26257
session:
  token_expiry_sec: 7200
  encryption_key: "default-encryption-key"
socket:
  port: 7350
  max_message_size_bytes: 4096
runtime:
  js_entrypoint: "main.js"
  # The runtime path is passed via --runtime.path CLI flag
  # (points to backend/build/ where main.js lives)
  env:
    - "DEBUG_MODE=true"
matchmaker:
  max_tickets: 2
  interval_sec: 5
  max_rooms_per_process: 100
  rev_cache_size: 1000
