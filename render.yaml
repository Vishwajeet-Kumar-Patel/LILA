services:
  - type: web
    name: lila-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: NAKAMA_DATABASE_ADDRESS
        sync: false # Set in Render dashboard (format: postgresql://USER:PASS@HOST:PORT/DB?sslmode=require)
      - key: NAKAMA_LOGGER_LEVEL
        value: INFO
    healthCheckPath: /
